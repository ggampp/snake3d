<!DOCTYPE html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Snake 3D — Planeta</title>
    <link rel="stylesheet" href="./src/ui/hud.css" />
  </head>
  <body>
    <canvas id="game"></canvas>

    <!-- HUD -->
    <div id="hud" class="panel">
      <div class="hud-title">SCORE</div>
      <div id="hud-score" class="hud-score">0</div>
      <ul class="hud-stats">
        <li><span>Comprimento</span><b id="hud-length">14</b></li>
        <li><span>Velocidade</span><b id="hud-speed">1.0×</b></li>
        <li><span>Recorde</span><b id="hud-best">0</b></li>
        <li><span>Abates</span><b id="hud-kills">0</b></li>
      </ul>
      <div id="hud-powerups" class="hud-powerups"></div>
    </div>

    <!-- Top-right controls -->
    <div id="controls" class="controls">
      <button id="btn-mute" class="ctl" title="Som (M)">🔊</button>
      <div class="ctl-zoom">
        <button id="btn-zoom-out" class="ctl" title="Ver mais longe (-)">−</button>
        <span class="ctl-label">Visão</span>
        <button id="btn-zoom-in" class="ctl" title="Aproximar (+)">+</button>
      </div>
    </div>

    <!-- Start / Game over overlay -->
    <div id="overlay" class="overlay">
      <div class="overlay-card">
        <div id="overlay-eyebrow" class="overlay-eyebrow">SNAKE 3D</div>
        <div id="overlay-title" class="overlay-title">Planeta</div>
        <div id="overlay-score" class="overlay-bigscore" hidden>0</div>

        <div id="overlay-summary" class="overlay-summary" hidden>
          <div><span id="overlay-best">0</span><label>Recorde</label></div>
          <div><span id="overlay-len">0</span><label>Comprimento</label></div>
        </div>

        <!-- Skin selector -->
        <div id="skin-picker" class="skin-picker">
          <div class="skin-label">Cobra</div>
          <div class="skin-options">
            <button class="skin-btn active" data-skin="cosmic"    style="--sc:#2fd6c4" title="Serpente Cósmica">🔵</button>
            <button class="skin-btn"        data-skin="emerald"   style="--sc:#2a8a3e" title="Jiboia Esmeralda">🟢</button>
            <button class="skin-btn"        data-skin="coral"     style="--sc:#cc2222" title="Cobra Coral">🔴</button>
            <button class="skin-btn"        data-skin="blue"      style="--sc:#1a4db8" title="Serpente Azul">💙</button>
            <button class="skin-btn"        data-skin="cobra"     style="--sc:#8b6820" title="Cobra Real">👑</button>
          </div>
          <div id="skin-name" class="skin-name">Serpente Cósmica</div>
        </div>

        <div class="name-row">
          <label for="player-name">Nome</label>
          <input id="player-name" maxlength="14" placeholder="Você" autocomplete="off" />
        </div>

        <div class="board">
          <div class="board-title">🏆 Placar <span id="board-mode" class="board-mode">local</span></div>
          <ol id="board-list" class="board-list"><li class="board-empty">Sem pontuações ainda</li></ol>
        </div>

        <p id="overlay-hint" class="overlay-hint">
          ← → ou A/D para virar · <b>Espaço</b> pula · <b>+/−</b> ajusta a visão · toque nas laterais no celular.
        </p>
        <button id="overlay-btn" class="overlay-btn">Jogar</button>
      </div>
    </div>

    <script type="module" src="./src/main.js"></script>
  </body>
</html>
